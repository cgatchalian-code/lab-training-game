<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTO — Leaderboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#0d1b2a; --bg2:#1b2f4a; --teal:#4ecdc4; --gray:#8ab4d4; --correct:#2ecc71; --wrong:#e74c3c; }
body { background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%); font-family:'Segoe UI',sans-serif; color:#fff; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:32px 16px 60px; }

.topbar { width:100%; max-width:640px; display:flex; align-items:center; justify-content:space-between; margin-bottom:36px; }
.brand { display:flex; align-items:center; gap:8px; }
.dot { width:7px; height:7px; background:var(--teal); border-radius:50%; }
.tl { color:var(--teal); font-size:.72rem; font-weight:700; letter-spacing:3px; text-transform:uppercase; }
.btn-sm { padding:8px 18px; border-radius:18px; border:2px solid var(--teal); background:transparent; color:var(--teal); cursor:pointer; font-weight:700; font-size:.8rem; text-decoration:none; transition:background .15s; }
.btn-sm:hover { background:rgba(78,205,196,.12); }

.wrap { width:100%; max-width:640px; }
h1 { font-size:2rem; font-weight:900; margin-bottom:4px; text-align:center; }
.sub { color:var(--gray); font-size:.88rem; text-align:center; margin-bottom:28px; }

.board-row {
  display:flex; align-items:center; gap:13px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09);
  border-radius:14px; padding:13px 18px; margin-bottom:10px;
}
.board-row.top1 { border-color:rgba(255,215,0,.5); background:rgba(255,215,0,.06); }
.board-row.top2 { border-color:rgba(192,192,192,.4); }
.board-row.top3 { border-color:rgba(205,127,50,.4); }
.board-rank { width:38px; text-align:center; font-size:1.4rem; flex-shrink:0; }
.av-mini { width:34px; height:34px; border-radius:50%; border:2px solid var(--teal); overflow:hidden; background:var(--bg2); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.board-info { flex:1; }
.board-name { font-size:1rem; font-weight:800; }
.board-meta { font-size:.72rem; color:var(--gray); margin-top:2px; }
.board-pts { font-size:1.35rem; font-weight:900; color:var(--teal); flex-shrink:0; }
.empty { text-align:center; color:var(--gray); padding:52px 0; font-size:.92rem; line-height:1.7; }
.loading { text-align:center; color:var(--gray); padding:52px 0; }
.spinner { display:inline-block; width:28px; height:28px; border:3px solid rgba(78,205,196,.2); border-top-color:var(--teal); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:12px; }
@keyframes spin { to { transform:rotate(360deg); } }

.actions { display:flex; gap:12px; justify-content:center; margin-top:24px; flex-wrap:wrap; }
.btn-primary { padding:11px 28px; border-radius:28px; background:var(--teal); color:var(--bg); font-weight:800; font-size:.9rem; text-decoration:none; transition:transform .15s; }
.btn-primary:hover { transform:scale(1.04); }
.btn-clear { padding:9px 20px; border-radius:18px; border:1px solid rgba(255,255,255,.15); background:transparent; color:rgba(255,255,255,.5); cursor:pointer; font-size:.78rem; transition:color .15s; }
.btn-clear:hover { color:var(--wrong); border-color:var(--wrong); }

.refresh { text-align:center; margin-bottom:16px; }
.refresh-btn { background:none; border:none; color:var(--gray); font-size:.75rem; cursor:pointer; text-decoration:underline; }
.refresh-btn:hover { color:var(--teal); }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="dot"></div>
    <div class="tl">BTO — Lab Training</div>
  </div>
  <a href="index.html" class="btn-sm">← Home</a>
</div>

<div class="wrap">
  <h1>🏆 Leaderboard</h1>
  <p class="sub">Hall of fame — who knows the protocols cold?</p>

  <div class="refresh"><button class="refresh-btn" onclick="loadBoard()">↻ Refresh scores</button></div>

  <div id="board-list"><div class="loading"><div class="spinner"></div><br>Loading scores...</div></div>

  <div class="actions">
    <a href="game.html" class="btn-primary">▶ Play Now</a>
    <button class="btn-clear" onclick="clearBoard()">Clear All Scores</button>
  </div>
</div>

<script>
const FB_URL='https://post-2da97-default-rtdb.firebaseio.com/scores';
const MINI = {
  john:`<svg viewBox="0 0 120 180" width="28" height="28"><rect x="18" y="88" width="84" height="78" rx="10" fill="#2a7abf"/><rect x="51" y="76" width="18" height="16" rx="5" fill="#f0c8a0"/><ellipse cx="60" cy="58" rx="27" ry="29" fill="#f0c8a0"/><ellipse cx="60" cy="34" rx="27" ry="13" fill="#4a3020"/><ellipse cx="49" cy="59" rx="5" ry="5" fill="#fff"/><ellipse cx="71" cy="59" rx="5" ry="5" fill="#fff"/><circle cx="50" cy="60" r="3" fill="#4a3020"/><circle cx="72" cy="60" r="3" fill="#4a3020"/><path d="M51 73 Q60 80 69 73" stroke="#c0785a" stroke-width="2" fill="none"/></svg>`,
  jane:`<svg viewBox="0 0 120 180" width="28" height="28"><rect x="18" y="88" width="84" height="78" rx="10" fill="#2a7abf"/><rect x="51" y="76" width="18" height="16" rx="5" fill="#8d5524"/><ellipse cx="60" cy="58" rx="27" ry="29" fill="#8d5524"/><ellipse cx="60" cy="30" rx="30" ry="20" fill="#1a0a00"/><circle cx="60" cy="14" r="6" fill="#ff6b6b"/><ellipse cx="49" cy="59" rx="5" ry="5" fill="#fff"/><ellipse cx="71" cy="59" rx="5" ry="5" fill="#fff"/><circle cx="50" cy="60" r="3" fill="#1a0a00"/><circle cx="72" cy="60" r="3" fill="#1a0a00"/><path d="M51 73 Q60 80 69 73" stroke="#6b3515" stroke-width="2" fill="none"/></svg>`,
  deer:`<svg viewBox="0 0 120 200" width="28" height="28"><rect x="18" y="100" width="84" height="78" rx="10" fill="#2a7abf"/><ellipse cx="60" cy="66" rx="28" ry="30" fill="#c8843c"/><ellipse cx="60" cy="80" rx="14" ry="10" fill="#e8b87a"/><ellipse cx="48" cy="64" rx="7" ry="8" fill="#fff"/><ellipse cx="72" cy="64" rx="7" ry="8" fill="#fff"/><circle cx="49" cy="65" r="5" fill="#3a1a00"/><circle cx="73" cy="65" r="5" fill="#3a1a00"/><ellipse cx="60" cy="77" rx="5" ry="4" fill="#e87090"/></svg>`
};

async function loadBoard() {
  const list = document.getElementById('board-list');
  list.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading scores...</div>';
  try {
    const res = await fetch(FB_URL + '.json');
    const data = await res.json();
    const board = data ? Object.values(data).sort((a,b) => b.totalScore - a.totalScore) : [];
    const medals = ['🥇','🥈','🥉'];
    const topClass = ['top1','top2','top3'];
    if (!board.length) {
      list.innerHTML = '<div class="empty">No scores yet.<br>Complete an assay to get on the board!</div>';
    } else {
      list.innerHTML = board.map((p, i) => `
        <div class="board-row ${topClass[i]||''}">
          <div class="board-rank">${medals[i]||'#'+(i+1)}</div>
          <div class="av-mini">${MINI[p.char]||''}</div>
          <div class="board-info">
            <div class="board-name">${p.name}</div>
            <div class="board-meta">${p.completed} assay${p.completed!==1?'s':''} completed</div>
          </div>
          <div class="board-pts">${p.totalScore} pts</div>
        </div>`).join('');
    }
  } catch(e) {
    list.innerHTML = '<div class="empty">Could not load scores.<br>Check your connection and try again.</div>';
  }
}

async function clearBoard() {
  if (confirm('Clear ALL scores from the leaderboard?')) {
    await fetch(FB_URL + '.json', { method: 'DELETE' });
    loadBoard();
  }
}

loadBoard();
</script>
</body>
</html>
